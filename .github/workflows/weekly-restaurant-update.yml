name: Weekly Restaurant Update

on:
  schedule:
    - cron: '0 3 * * 1'   # Her Pazartesi 03:00 UTC
  workflow_dispatch:
    inputs:
      scrape_ratings:
        description: 'Google Maps rating scraping (local IP gerektirir, CI da çalışmayabilir)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests
          if [ "${{ github.event.inputs.scrape_ratings }}" = "true" ]; then
            pip install playwright
            playwright install chromium --with-deps
          fi

      - name: Run district update (OSM + Nominatim)
        env:
          SKIP_RATINGS: ${{ github.event.inputs.scrape_ratings == 'true' && '0' || '1' }}
          PYTHONUNBUFFERED: '1'
        run: python scripts/add_all_districts.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/new_restaurants.json data/neighborhood_to_district.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ADDED=$(python - <<'EOF'
          import json
          with open("data/new_restaurants.json") as f:
              print(len(json.load(f)))
          EOF
          )
          git add data/new_restaurants.json data/neighborhood_to_district.json
          git commit -m "chore: weekly restaurant update — ${ADDED} restaurants in new_restaurants.json"
          git push
