name: Weekly OSM Sync

on:
  schedule:
    # Her Pazartesi 03:00 UTC (Türkiye 06:00)
    - cron: "0 3 * * 1"
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install requests groq

      - name: OSM sync çalıştır
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/sync_osm.py

      - name: Özet rapor
        run: |
          python - <<'EOF'
          import json
          with open("data/new_restaurants.json", encoding="utf-8") as f:
              d = json.load(f)
          print(f"\n{'='*50}")
          print(f"📊 OSM SYNC RAPORU")
          print(f"{'='*50}")
          print(f"Toplam yeni havuz: {len(d)} restoran")
          if d:
              print(f"\nSon eklenenler (lastUpdated göre):")
              today = sorted(set(r['lastUpdated'] for r in d))[-1]
              new_today = [r for r in d if r['lastUpdated'] == today]
              for r in new_today:
                  print(f"  + {r['name']} | {r['neighborhood']} | {r['cuisine']}")
              if not new_today:
                  print("  (bugün yeni ekleme yok)")
          print(f"{'='*50}\n")
          EOF

      - name: Değişiklik var mı kontrol et
        id: diff
        run: |
          git diff --exit-code data/new_restaurants.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BEFORE=$(git show HEAD:data/new_restaurants.json | python -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          AFTER=$(python -c "import json; print(len(json.load(open('data/new_restaurants.json'))))")
          NEW=$((AFTER - BEFORE))
          git add data/new_restaurants.json
          git commit -m "chore: OSM sync — +${NEW} yeni restoran, toplam ${AFTER} [skip ci]"
          git push

      - name: Değişiklik yok
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ Yeni restoran bulunamadı, commit atlanıyor."
