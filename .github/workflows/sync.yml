name: Weekly OSM Sync

on:
  schedule:
    # Her Pazartesi 03:00 UTC (Türkiye 06:00)
    - cron: "0 3 * * 1"
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install requests groq

      - name: OSM sync çalıştır
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/sync_osm.py

      - name: Değişiklik var mı kontrol et
        id: diff
        run: |
          git diff --exit-code data/new_restaurants.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          COUNT=$(python -c "import json; d=json.load(open('data/new_restaurants.json')); print(len(d))")
          git add data/new_restaurants.json
          git commit -m "chore: OSM sync — yeni havuz ${COUNT} restoran [skip ci]"
          git push
